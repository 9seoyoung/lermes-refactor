stages:
  - init      # 초기 준비
  - test      # 테스트 코드 실행
  - build     # React & Spring Boot 빌드
  - deploy    # 결과물 복사

variables:
  NODE_PATH: "C:/Pack_CICD/bin/node/v22.18.0"
  REACT_BUILD_DIR: "src/main/frontend/build"
  FRONTEND_TARGET: "C:/Pack_CICD/kdt10_3dpjt/app/frontend"
  BACKEND_TARGET: "C:/Pack_CICD/kdt10_3dpjt/app/backend"
  # REACT_APP_API_URL: "http://onopco2.iptime.org:940"  # 배포용 API URL

before_script:
  - Remove-Item Env:\CI_SERVER_TLS_CA_FILE -ErrorAction SilentlyContinue
  - $OutputEncoding = [Console]::OutputEncoding = [Text.UTF8Encoding]::new($false)
  - $env:Path += ";$env:NODE_PATH"
  - $env:Path += ";$env:APPDATA\npm"

# 0️⃣ Init Job (선택사항)
init-job:
  stage: init
  script:
    - echo "Init Remove unnecessary directories"
    - if (Test-Path "src/main/frontend/build") { Remove-Item -Recurse -Force "src/main/frontend/build" }
    - if (Test-Path "src/main/resources/static") { Remove-Item -Recurse -Force "src/main/resources/static" }
    - echo "Run Checkstyle"
    - ./gradlew checkstyleMain --no-daemon
  rules:
    - if: '$CI_COMMIT_BRANCH == "DEV"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: always

# 1️⃣ Test Job
test-job:
  stage: test
  script:
    - echo "🧪 Spring Boot 테스트 코드 실행 무시"
    - ./gradlew build -x test --no-daemon
  rules:
    - if: '$CI_COMMIT_BRANCH == "DEV"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: always

# 2️⃣ Build Job
build-job:
  stage: build
  timeout: 30m

  before_script:
    # PowerShell 출력 버퍼 확장 + 진행바 비활성화
    - $ProgressPreference = 'SilentlyContinue'
    - $OutputEncoding = [Console]::OutputEncoding = [Text.UTF8Encoding]::new($false)
    - $Host.UI.RawUI.BufferSize = New-Object Management.Automation.Host.Size(512,3000)
    - echo "🧩 PowerShell 콘솔 버퍼 확장 완료"

  script:
    - echo "⚙️ React Build 시작"
    - cd src/main/frontend

    # 📦 npm 최신화 + 캐시 기반 설치
    - echo "📦 NPM 최신화"
    - npm install -g npm@latest
    - echo "📦 NPM 패키지 설치 (캐시 활용, 경고 최소화)"
    - $env:NODE_OPTIONS="--no-warnings"
    - npm ci --prefer-offline --no-audit --no-fund --silent

    # ⚡ React 빌드 최적화
    - echo "⚙️ React 빌드 최적화 옵션 적용"
    - $env:CI="false"
    - $env:GENERATE_SOURCEMAP="false"
    - $env:DISABLE_ESLINT_PLUGIN="true"
    - $env:BROWSER="none"
    - npm run build --silent

    - cd ../../../
    - echo "🚀 SpringBoot Gradle Build 시작"
    - ./gradlew clean build -x test --no-daemon --parallel --build-cache

  # 캐시 설정 (npm + Gradle)
  cache:
    key: "$CI_PROJECT_NAME-build-cache"
    paths:
      # Gradle 캐시 경로는 현재 working dir 기준
      - .gradle/
      # npm/node_modules 캐시
      - src/main/frontend/node_modules/
      - $env:APPDATA\npm-cache/

  artifacts:
    paths:
      - $REACT_BUILD_DIR
      - build/libs/*.jar

  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: always


# 3️⃣ Deploy Job
deploy-job:
  stage: deploy
  script:
    - echo "📦 React 결과물 복사 → $env:FRONTEND_TARGET"
    # React 앱 종료 (Node 프로세스 종료, 없으면 무시)
    - taskkill /f /im node.exe > $null 2>&1 || echo "Node 프로세스 없음"
    # React 덮어쓰기
    - Copy-Item -Path "$env:REACT_BUILD_DIR\*" -Destination "$env:FRONTEND_TARGET" -Recurse -Force

    - echo "📦 SpringBoot JAR 덮어쓰기 → $env:BACKEND_TARGET"
    # SpringBoot 프로세스 종료 (포트 940 기준)
    - |
      $procs = @()
      $connections = Get-NetTCPConnection -LocalPort 940 -ErrorAction SilentlyContinue
      if ($connections) {
          foreach ($c in $connections) {
              try {
                  $proc = Get-Process -Id $c.OwningProcess -ErrorAction SilentlyContinue
                  if ($proc -and $proc.ProcessName -notin @('Idle','System')) {
                      $procs += $proc
                  }
              } catch { Write-Host "프로세스 없음" }
          }
      }
      if ($procs.Count -gt 0) {
          $procs | Stop-Process -Force
          Start-Sleep -Seconds 2
      } else {
          Write-Host "940 포트 사용 프로세스 없음, 종료 건너뜀"
      }

    # SpringBoot JAR 덮어쓰기
    - Copy-Item -Path "build\libs\*.jar" -Destination "$env:BACKEND_TARGET" -Force

  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: always

