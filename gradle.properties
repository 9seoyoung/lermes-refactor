# 기본 trustStore 설정 (자바가 cacerts 인증서 저장소를 제대로 읽게 만듦)
systemProp.javax.net.ssl.trustStoreType=JKS
systemProp.javax.net.ssl.trustStorePassword=changeit
systemProp.javax.net.ssl.trustStore=${JAVA_HOME}/lib/security/cacerts

# 인증서 관련 오류 무시 옵션 (로컬 개발 시에만 사용 권장)
org.gradle.jvmargs=-Dcom.sun.net.ssl.checkRevocation=false -Dsun.security.ssl.allowUnsafeRenegotiation=true