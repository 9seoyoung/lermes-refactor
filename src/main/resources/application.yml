# 커스텀변수 선언
my:
  datasource:
#    port: '32933'  # MySQL 커스텀 포트
#    dbname: kdt10_3dpjt  # 데이터베이스 이름
#    host: citek707.iptime.org  # 외부 DB 서버 주소
    port: ${DB_PORT}
    dbname: ${DB_NAME}
    host: ${DB_HOST}

server:
  address: 0.0.0.0  # 외부에서도 접근 가능하게 설정
  port: '940'  # 서버 포트 번호
  servlet:
    context-path: ''  # 루트 경로로 애플리케이션 실행
    session:
      cookie:
        name: JSESSIONID
        http-only: true
        secure: false #false = 개발용(http) # true = 배포용(https)
        same-site: LAX # 프론트: 3000 <-> 백 :940 쿠키전달 #LAX = 개발용 #NONE = 배포용(프론트/백 도메인/포트 다르면 none 권장한다고 함)

pagehelper:
  helperDialect: mysql  # 사용하는 DB 방언 (MySQL, Oracle 등)
  params: count=countSql  # count 쿼리 자동 생성 설정
  reasonable: 'true'  # 페이지 번호가 0이거나 음수면 1페이지로 자동 보정
  supportMethodsArguments: 'true'  # pageNum, pageSize 등의 파라미터 직접 전달 가능

logging:
  level:
    org:
      mybatis: 'DEBUG'  # MyBatis 관련 디버그 로그 출력
      apache:
        ibatis: 'DEBUG'  # iBatis 관련 디버그 로그 출력
    java:
      sql: 'DEBUG'  # SQL 로그 출력
    p6spy: INFO  # P6Spy를 통한 SQL 로그 레벨
    jdbc:
      sqlonly: 'DEBUG '  # JDBC 실행 SQL만 출력
      sqltiming: 'DEBUG'  # JDBC SQL 실행 시간 출력

spring:
  config:
    import: optional:file:.env[.properties]
# DB 연결 URL (host, port, dbname 변수를 이용해 구성)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver  # MySQL JDBC 드라이버 클래스
    password: ${DB_PASSWORD}  # DB 비밀번호
    username: ${DB_USERNAME}  # DB 사용자명
    url: jdbc:mysql://${my.datasource.host}:${my.datasource.port}/${my.datasource.dbname}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8

  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
#redis 사용시
#  data:
#    redis:
#      host: localhost
#      port: 6379


  #  JSP 사용시 주석해제
#  mvc:
#    view:
#      prefix: /WEB-INF/views/  # JSP 파일이 위치한 디렉토리
#      suffix: .jsp  # 뷰 파일 확장자
#      encoding: UTF-8  # 뷰 인코딩 설정

# HTML사용시 주석해제    
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    #suffix: .mustache
    encoding: UTF-8
    mode: HTML

  servlet:
    multipart:
      enabled: 'true'  # 파일 업로드 활성화
      max-file-size: 50MB  # 단일 파일 최대 크기 ->Spring은 50MiB로 해석해서 50MB보다 조금 더 많이 들어감
      max-request-size: 100MB  # 요청 전체 크기 제한

  application:
    name: ${DB_NAME}  # 스프링 애플리케이션 이름

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile

          kakao:
            client-id: ${KAKAO_CLIENT_ID}   # 카카오 REST API 키
            client-secret: ${KAKAO_CLIENT_SECRET}  # 선택적 (보안 탭에서 생성한 경우만)
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
            client-name: Kakao
            provider: kakao

          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
              - mobile
            client-authentication-method: client_secret_post
            provider: naver

        provider:
          google:
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response


mybatis:
  mapper-locations: classpath:/mapper/**/*.xml  # Mapper XML 파일 위치
  type-aliases-package: com.kdt.KDT_PJT.cmmn.map  # Alias 등록할 패키지 (예: CmmnMap)
  configuration:
    map-underscore-to-camel-case: 'true'  # DB 컬럼명과 Java camelCase 자동 매핑
